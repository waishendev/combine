services:
  booking_gentlegurl_shop:
    container_name: booking_gentlegurl_shop_prod
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_COLOR: ${NEXT_PUBLIC_COLOR}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_TIMEZONE: ${NEXT_PUBLIC_TIMEZONE}

    # host 3002 -> container 3000 (avoid conflicts)
    ports:
      - "3002:3000"
      # Safer with reverse proxy:
      # - "127.0.0.1:3002:3000"

    env_file:
      - .env.production
    environment:
      NODE_ENV: "production"
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      HEALTHCHECK_PATH: "/api/healthz"

    # docker-watch labels (toggle from .env.*)
    labels:
      - com.dkwatch.enable=${WATCH_ENABLE}
      - com.dkwatch.group=${WATCH_NAME}

    restart: unless-stopped

    # Read-only root fs + required writable points
    read_only: true
    tmpfs:
      - /tmp:size=64m,nr_inodes=4096,mode=1777,noexec,nosuid,nodev
      - /app/.next/cache:size=256m,mode=1777

    # Minimal privileges
    user: "node"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # Built-in init for clean signal handling
    init: true

    # Better limits for concurrency
    pids_limit: 2048
    ulimits:
      nofile:
        soft: 131072
        hard: 131072

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Node-based healthcheck (enable when /api/healthz is ready)
    # healthcheck:
    #   test: ["CMD", "node", "/app/healthcheck.js"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 15s
